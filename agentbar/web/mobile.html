<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>AgentBar</title>
<style>
:root{color-scheme:light dark}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;margin:0;
     background:#f2f2f7;color:#1c1c1e;padding-bottom:88px}
@media(prefers-color-scheme:dark){body{background:#000;color:#fff}}
header{position:sticky;top:0;z-index:10;background:rgba(242,242,247,.92);
       backdrop-filter:blur(12px);padding:14px 16px 10px;
       border-bottom:.5px solid rgba(0,0,0,.12)}
@media(prefers-color-scheme:dark){header{background:rgba(0,0,0,.85);
       border-bottom-color:rgba(255,255,255,.15)}}
h1{font-size:20px;margin:0;display:flex;align-items:center;gap:8px}
#stat{font-size:13px;color:#8e8e93;margin-top:2px}
main{padding:12px}
.card{background:#fff;border-radius:12px;padding:12px 14px;margin-bottom:10px;
      box-shadow:0 1px 2px rgba(0,0,0,.05)}
@media(prefers-color-scheme:dark){.card{background:#1c1c1e}}
.trow{display:flex;align-items:center;gap:10px}
.dot{width:10px;height:10px;border-radius:5px;flex:none}
.d-running{background:#34c759;animation:pulse 1.2s infinite}
.d-queued{background:#ff9f0a}.d-waiting_quota{background:#af52de}
.d-paused{background:#8e8e93}.d-succeeded{background:#30d158}
.d-failed{background:#ff3b30}.d-cancelled{background:#8e8e93}
@keyframes pulse{50%{opacity:.4}}
.ttitle{font-size:15px;font-weight:600;flex:1;min-width:0;
        overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tmeta{font-size:12px;color:#8e8e93;margin-top:4px}
.treason{font-size:12px;color:#8e8e93;margin-top:2px;overflow:hidden;
         text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;
         -webkit-box-orient:vertical}
.badge{font-size:11px;padding:2px 8px;border-radius:9px;flex:none;
       background:rgba(120,120,128,.16)}
button.cancel{border:none;background:rgba(255,59,48,.12);color:#ff3b30;
              border-radius:8px;padding:5px 10px;font-size:12px;flex:none}
#fab{position:fixed;right:20px;bottom:28px;width:56px;height:56px;z-index:20;
     border-radius:28px;border:none;background:#007aff;color:#fff;font-size:30px;
     line-height:56px;box-shadow:0 4px 14px rgba(0,122,255,.4)}
#sheet{position:fixed;inset:0;z-index:30;display:none;background:rgba(0,0,0,.4)}
#sheet.open{display:block}
#form{position:absolute;left:0;right:0;bottom:0;background:#f2f2f7;
      border-radius:16px 16px 0 0;padding:16px 16px calc(20px + env(safe-area-inset-bottom));
      max-height:86vh;overflow-y:auto}
@media(prefers-color-scheme:dark){#form{background:#1c1c1e}}
#form h2{margin:0 0 12px;font-size:17px}
label{display:block;font-size:12px;color:#8e8e93;margin:10px 0 4px}
textarea,input,select{width:100%;border:none;border-radius:10px;padding:10px 12px;
      font-size:15px;background:#fff;color:inherit;font-family:inherit}
@media(prefers-color-scheme:dark){textarea,input,select{background:#2c2c2e}}
textarea{min-height:88px;resize:vertical}
.row2{display:flex;gap:10px}.row2>div{flex:1;min-width:0}
#submit{width:100%;margin-top:16px;border:none;border-radius:12px;padding:13px;
        background:#007aff;color:#fff;font-size:16px;font-weight:600}
#submit:disabled{opacity:.5}
#msg{font-size:13px;text-align:center;margin-top:8px;min-height:18px}
.ok{color:#34c759}.err{color:#ff3b30}
#login{padding:40px 24px;text-align:center}
#login input{margin:12px 0;text-align:center}
.empty{text-align:center;color:#8e8e93;padding:40px 0;font-size:14px}
</style>
</head>
<body>
<header>
  <h1>◆ AgentBar <span id="hstat" class="badge"></span></h1>
  <div id="stat">连接中…</div>
</header>
<main id="list"><div class="empty">加载中…</div></main>

<div id="login" style="display:none">
  <h2>需要访问令牌</h2>
  <p style="color:#8e8e93;font-size:13px">在 Mac 菜单栏 AgentBar → 📱 手机访问 中扫码，或手动粘贴 token</p>
  <input id="tokin" placeholder="token" autocapitalize="off" autocorrect="off">
  <button id="tokgo" style="width:100%;border:none;border-radius:12px;padding:13px;background:#007aff;color:#fff;font-size:16px">连接</button>
</div>

<button id="fab" aria-label="添加任务">＋</button>

<div id="sheet">
  <div id="form">
    <h2>新建任务</h2>
    <label>Prompt</label>
    <textarea id="f-prompt" placeholder="要执行的任务…"></textarea>
    <div class="row2">
      <div><label>工具</label><select id="f-tool"></select></div>
      <div><label>权限</label><select id="f-profile">
        <option value="readonly">🔒 只读</option>
        <option value="edits" selected>✏️ 可编辑</option>
      </select></div>
    </div>
    <div class="row2">
      <div><label>模型（可空）</label>
        <input id="f-model" list="models" placeholder="默认" autocapitalize="off">
        <datalist id="models"></datalist></div>
      <div><label>Effort（可空）</label><select id="f-effort"><option value="">默认</option></select></div>
    </div>
    <label>工作目录</label>
    <input id="f-cwd" autocapitalize="off" autocorrect="off">
    <button id="submit">提交任务</button>
    <div id="msg"></div>
  </div>
</div>

<script>
(function(){
"use strict";
var qs = new URLSearchParams(location.search);
if (qs.get("token")) {
  localStorage.setItem("agentbar_token", qs.get("token"));
  history.replaceState(null, "", location.pathname);
}
var TOKEN = localStorage.getItem("agentbar_token") || "";
var $ = function(id){ return document.getElementById(id); };
var TOOLS = [];

function api(method, path, body) {
  return fetch(path, {
    method: method,
    headers: {"X-Agentbar-Token": TOKEN, "Content-Type": "application/json"},
    body: body ? JSON.stringify(body) : undefined
  }).then(function(r){ return r.json(); });
}

function needLogin() {
  $("list").style.display = "none";
  $("fab").style.display = "none";
  $("login").style.display = "block";
  $("stat").textContent = "未认证";
}
$("tokgo").onclick = function(){
  var t = $("tokin").value.trim();
  if (!t) return;
  localStorage.setItem("agentbar_token", t);
  location.reload();
};

var STATE_TXT = {running:"运行中", queued:"排队", waiting_quota:"等额度",
                 paused:"暂停", succeeded:"成功", failed:"失败", cancelled:"已取消"};
var ACTIVE = {running:1, queued:1, waiting_quota:1, paused:1};

function esc(s){ var d=document.createElement("i"); d.textContent=s||""; return d.innerHTML; }
function clock(ts){
  if (!ts) return "";
  var d = new Date(ts*1000), now = new Date();
  var hm = ("0"+d.getHours()).slice(-2)+":"+("0"+d.getMinutes()).slice(-2);
  return d.toDateString()===now.toDateString() ? hm
       : (d.getMonth()+1)+"-"+d.getDate()+" "+hm;
}

function render(s) {
  var glyph = {idle:"空闲", running:"运行中", waiting:"等待", paused:"已暂停"}[s.status]||s.status;
  $("hstat").textContent = glyph;
  var quota = [];
  Object.keys(s.quota||{}).forEach(function(k){
    quota.push(k+": "+(s.quota[k].detail||s.quota[k].state));
  });
  $("stat").textContent = "队列 "+s.queued+" · 等额度 "+s.waiting_quota+
    (quota.length ? " · "+quota.join(" · ") : "");

  var tasks = (s.tasks||[]).slice().reverse();
  var act = tasks.filter(function(t){ return ACTIVE[t.state]; });
  var done = tasks.filter(function(t){ return !ACTIVE[t.state]; }).slice(0, 20);
  var h = "";
  act.concat(done).forEach(function(t){
    h += '<div class="card"><div class="trow">'
      + '<div class="dot d-'+t.state+'"></div>'
      + '<div class="ttitle">'+esc(t.title||t.prompt||"")+'</div>'
      + '<span class="badge">'+esc(t.tool)+'</span>'
      + (ACTIVE[t.state] ? '<button class="cancel" data-id="'+t.id+'">取消</button>' : '')
      + '</div><div class="tmeta">'+(STATE_TXT[t.state]||t.state)
      + (t.model ? " · "+esc(t.model) : "")
      + (t.scheduled_at && t.scheduled_at*1000 > Date.now() ? " · ⏰"+clock(t.scheduled_at) : "")
      + " · "+clock(t.created_at)+'</div>'
      + (t.state_reason ? '<div class="treason">'+esc(t.state_reason)+'</div>' : '')
      + '</div>';
  });
  $("list").innerHTML = h || '<div class="empty">暂无任务</div>';
  Array.prototype.forEach.call(document.querySelectorAll("button.cancel"), function(b){
    b.onclick = function(){
      if (!confirm("取消该任务？")) return;
      api("POST", "/api/tasks/"+b.dataset.id+"/cancel").then(tick);
    };
  });
}

var failN = 0;
function tick() {
  api("GET", "/api/state").then(function(d){
    if (d.error === "unauthorized") { needLogin(); return; }
    failN = 0; render(d);
  }).catch(function(){
    failN++;
    if (failN > 2) $("stat").textContent = "连接断开（Mac 上的 AgentBar 在运行吗？）";
  });
}

function loadTools() {
  api("GET", "/api/tools").then(function(d){
    if (!d.ok) return;
    TOOLS = d.tools||[];
    var sel = $("f-tool"); sel.innerHTML = "";
    TOOLS.forEach(function(t){
      if (!t.installed) return;
      var o = document.createElement("option");
      o.value = t.name; o.textContent = t.display_name || t.name;
      sel.appendChild(o);
    });
    if (d.default_cwd && !$("f-cwd").value) $("f-cwd").value = d.default_cwd;
    if (d.allow_full_profile) {
      var o = document.createElement("option");
      o.value = "full"; o.textContent = "⚠️ 完全权限";
      $("f-profile").appendChild(o);
    }
    syncToolChoices();
  });
}
function syncToolChoices() {
  var t = TOOLS.filter(function(x){ return x.name === $("f-tool").value; })[0];
  var dl = $("models"); dl.innerHTML = "";
  ((t&&t.models)||[]).forEach(function(m){
    var o = document.createElement("option"); o.value = m; dl.appendChild(o);
  });
  $("f-model").value = "";
  var ef = $("f-effort"); ef.innerHTML = '<option value="">默认</option>';
  ((t&&t.efforts)||[]).forEach(function(e){
    var o = document.createElement("option"); o.value = e; o.textContent = e;
    ef.appendChild(o);
  });
}
$("f-tool").onchange = syncToolChoices;

$("fab").onclick = function(){ $("sheet").classList.add("open"); };
$("sheet").onclick = function(e){ if (e.target === $("sheet")) $("sheet").classList.remove("open"); };

$("submit").onclick = function(){
  var prompt = $("f-prompt").value.trim();
  var m = $("msg");
  if (!prompt) { m.className="err"; m.textContent="prompt 不能为空"; return; }
  $("submit").disabled = true;
  api("POST", "/api/tasks", {
    prompt: prompt,
    tool: $("f-tool").value,
    cwd: $("f-cwd").value.trim(),
    profile: $("f-profile").value,
    model: $("f-model").value.trim() || null,
    effort: $("f-effort").value || null
  }).then(function(d){
    $("submit").disabled = false;
    if (d.ok) {
      m.className="ok"; m.textContent="已入队 ✓";
      $("f-prompt").value = "";
      setTimeout(function(){
        $("sheet").classList.remove("open"); m.textContent="";
      }, 700);
      tick();
    } else {
      m.className="err"; m.textContent = d.error || "提交失败";
    }
  }).catch(function(){
    $("submit").disabled = false;
    m.className="err"; m.textContent = "网络错误";
  });
};

if (!TOKEN) { needLogin(); }
else { tick(); loadTools(); setInterval(tick, 4000); }
})();
</script>
</body>
</html>
